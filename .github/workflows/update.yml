name: Update manaba assignments ICS

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-ics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        env:
          MANABA_USER_ID: ${{ secrets.MANABA_USER_ID }}
          MANABA_PASSWORD: ${{ secrets.MANABA_PASSWORD }}
          OUTPUT_ICS_PATH: docs/assignments.ics
        run: |
          mkdir -p docs
          python scraper.py
          echo "---- docs contents ----"
          ls -l docs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes. Skipping commit."
          else
            git commit -m "Update assignments.ics"
            git push
          fi
